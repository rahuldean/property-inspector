name: deploy-api

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-deploy-api:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        run: echo "IMAGE=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/property-inspector/api:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get LiteLLM URL
        run: |
          LITELLM_URL=$(gcloud run services describe litellm-proxy \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "LITELLM_URL=$LITELLM_URL" >> $GITHUB_ENV

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy property-inspector-api \
            --image=${{ env.IMAGE }} \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --service-account=property-inspector-run@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=10 \
            --port=8080 \
            --set-env-vars=LITELLM_URL=${{ env.LITELLM_URL }},LITELLM_MODEL=inspector \
            --update-secrets=LITELLM_API_KEY=LITELLM_VIRTUAL_KEY:latest \
            --vpc-egress=all-traffic \
            --network=default \
            --subnet=default \
            --quiet

      - name: Print live URL
        run: |
          URL=$(gcloud run services describe property-inspector-api \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "API: $URL" >> $GITHUB_STEP_SUMMARY
