services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${LITELLM_DB_NAME:-litellm}
      POSTGRES_USER: ${LITELLM_DB_USER:-llmproxy}
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD:-dbpassword9090}
    volumes:
      - litellm_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${LITELLM_DB_NAME:-litellm} -U ${LITELLM_DB_USER:-llmproxy}"]
      interval: 1s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - STORE_MODEL_IN_DB=True
      - DATABASE_URL=postgresql://${LITELLM_DB_USER:-llmproxy}:${LITELLM_DB_PASSWORD:-dbpassword9090}@db:5432/${LITELLM_DB_NAME:-litellm}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  api:
    build: .
    ports:
      - "${API_PORT:-6000}:6000"
    environment:
      - PORT=6000
      - LITELLM_URL=http://litellm:4000
      - LITELLM_MODEL=${LITELLM_MODEL:-inspector}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - CF_ACCESS_CLIENT_ID=${CF_ACCESS_CLIENT_ID:-}
      - CF_ACCESS_CLIENT_SECRET=${CF_ACCESS_CLIENT_SECRET:-}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-32}
    depends_on:
      litellm:
        condition: service_healthy
    restart: unless-stopped

volumes:
  litellm_pgdata:
